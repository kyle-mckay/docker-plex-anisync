name: Build and Test Dev Docker Image

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      #- name: Installing Dependencies
      #  run: sudo apt-get update && sudo apt-install git

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Download Python repo
        run: git clone https://github.com/RickDB/PlexAniSync.git

      - name: Build Docker image
        run: |
          ls -l
          la -l 
          docker build -t python-docker-template .
